name: Sync Release to Deployment

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-branch:
    name: Force Push Tag to Deployment Branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync deployment branch with release tag
        run: |
          # Pushes the exact code from the triggered Release Tag directly to the deployment branch,
          # overwriting any diverging history to ensure a clean 1:1 match for Supabase.
          git push origin ${{ github.ref }}:refs/heads/deployment --force
